<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Personal Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #6c63ff;
      --accent-light: #a89cff;
      --text: #e8e9f0;
      --text-muted: #8a8fa8;
      --border: rgba(255,255,255,0.07);
      --user-bubble: #6c63ff;
      --bot-bubble: #1a1d27;
      --radius: 14px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .header-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-info h1 { font-size: 15px; font-weight: 600; }
    .header-info p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: #63e6a0; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #63e6a0; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* System prompt bar */
    .system-bar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .system-bar label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .system-bar input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px; font-size: 12px;
      color: var(--text); outline: none;
    }
    .system-bar input:focus { border-color: var(--accent); }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .msg.user .msg-avatar { background: var(--accent); }
    .msg.bot  .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }

    .msg-bubble {
      padding: 10px 14px; border-radius: var(--radius);
      font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--user-bubble); color: #fff;
      border-radius: var(--radius) 4px var(--radius) var(--radius);
    }
    .msg.bot .msg-bubble {
      background: var(--bot-bubble); color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
    }

    /* Typing dots */
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--surface2);
    }
    textarea {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; font-size: 14px;
      color: var(--text); font-family: inherit; resize: none;
      outline: none; line-height: 1.5; max-height: 120px; overflow-y: auto;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    .clear-btn {
      font-size: 12px; color: var(--text-muted); background: none;
      border: 1px solid var(--border); border-radius: 8px;
      padding: 5px 10px; cursor: pointer; transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--text); }

    .footer-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 16px 10px; font-size: 11px; color: var(--text-muted);
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-avatar">🤖</div>
    <div class="header-info">
      <h1>Personal Assistant</h1>
      <p>Powered by Claude AI</p>
    </div>
    <div class="status"><div class="status-dot"></div> Online</div>
  </div>

  <div class="system-bar">
    <label>Personality:</label>
    <input type="text" id="system-input" value="You are a helpful personal assistant. Be friendly, concise, and practical." />
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-avatar">🤖</div>
      <div class="msg-bubble">Hello! I'm your personal assistant powered by Claude AI. How can I help you today?</div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="user-input" rows="1" placeholder="Type your message… (Enter to send, Shift+Enter for new line)"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="footer-row">
    <span id="msg-count">0 messages</span>
    <button class="clear-btn" onclick="clearChat()">Clear chat</button>
  </div>

</div>

<script>
  const API_URL = "/chat";  // Change to full URL if deploying separately
  let history = [];

  function addMessage(role, text) {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-avatar">${role === "user" ? "👤" : "🤖"}</div>
      <div class="msg-bubble">${escapeHtml(text)}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    updateCount();
  }

  function escapeHtml(text) {
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function showTyping() {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg bot"; div.id = "typing";
    div.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  function updateCount() {
    document.getElementById("msg-count").textContent = `${history.length} messages`;
  }

  function clearChat() {
    history = [];
    const c = document.getElementById("messages");
    c.innerHTML = `<div class="msg bot"><div class="msg-avatar">🤖</div><div class="msg-bubble">Chat cleared! How can I help you?</div></div>`;
    updateCount();
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();
    if (!text) return;

    input.value = ""; input.style.height = "auto";
    addMessage("user", text);
    history.push({ role: "user", content: text });

    const btn = document.getElementById("send-btn");
    btn.disabled = true;
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: history,
          system: document.getElementById("system-input").value
        })
      });
      const data = await res.json();
      removeTyping();

      if (data.reply) {
        addMessage("bot", data.reply);
        history.push({ role: "assistant", content: data.reply });
      } else {
        addMessage("bot", "Error: " + (data.error || "Unknown error"));
      }
    } catch (e) {
      removeTyping();
      addMessage("bot", "Connection error. Is the server running?");
    }
    btn.disabled = false;
  }

  document.getElementById("user-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
